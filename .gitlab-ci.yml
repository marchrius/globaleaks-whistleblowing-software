variables:
  TAG: $CI_COMMIT_REF_SLUG-$CI_COMMIT_SHA
  AWS_REGISTRY: $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
  AWS_REGISTRY_IMAGE: $AWS_REGISTRY/globaleaks
  GITLAB_REGISTRY_IMAGE: $CI_REGISTRY_IMAGE

default:
  image: bentolor/docker-dind-awscli
  services:
    - docker:dind
  before_script:
    - printf "%s" "${CI_REGISTRY_PASSWORD}" | docker login --username ${CI_REGISTRY_USER} --password-stdin $CI_REGISTRY
    - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_REGISTRY

stages:
  - build
  - release

build-main:
  variables:
    TAG: $CI_COMMIT_TAG  # Usa il tag Git come tag Docker
  stage: build
  only:
    - tags
  script:
    - |
      if [ -z "$TAG" ]; then echo "❌ ERROR: TAG is not set!"; exit 1; fi
      TAG_CLEANED=$(echo "$TAG" | sed 's/-luna$//')
      docker build -t $GITLAB_REGISTRY_IMAGE:$TAG_CLEANED -t $GITLAB_REGISTRY_IMAGE:latest -t $AWS_REGISTRY_IMAGE:$TAG_CLEANED -t $AWS_REGISTRY_IMAGE:latest . -f docker/Dockerfile.deploy
      docker push $GITLAB_REGISTRY_IMAGE:$TAG_CLEANED
      docker push $GITLAB_REGISTRY_IMAGE:latest
      docker push $AWS_REGISTRY_IMAGE:$TAG_CLEANED
      docker push $AWS_REGISTRY_IMAGE:latest

build-develop:
  variables:
    TAG: $CI_COMMIT_REF_SLUG-$CI_COMMIT_SHA  # Definisci TAG anche qui
  stage: build
  only:
    - develop
  script:
    - |
      if [ -z "$TAG" ]; then echo "❌ ERROR: TAG is not set!"; exit 1; fi
      docker build -t $GITLAB_REGISTRY_IMAGE:$TAG -t $GITLAB_REGISTRY_IMAGE:latest . -f docker/Dockerfile.deploy
      docker push $GITLAB_REGISTRY_IMAGE:$TAG
      docker push $GITLAB_REGISTRY_IMAGE:latest

release:
  variables:
    TAG: $CI_COMMIT_TAG  # Usa il tag Git come tag Docker
  only:
    - tags
  needs:
    - build-main
  image: curlimages/curl:latest
  script:
    - |
      TAG_CLEANED=$(echo "$CI_COMMIT_TAG" | sed 's/-luna$//')
      echo "Creating GitLab Release for tag: $TAG_CLEANED"
      echo "Docker Image AWS" > docker-info.txt
      echo "  Registry: $AWS_REGISTRY_IMAGE:$TAG_CLEANED" >> docker-info.txt
      echo "  Pull Command: docker pull $AWS_REGISTRY_IMAGE:$TAG_CLEANED" >> docker-info.txt
      echo "" >> docker-info.txt
      echo "Docker Image GitLab" >> docker-info.txt
      echo "  Registry: $GITLAB_REGISTRY_IMAGE:$TAG_CLEANED" >> docker-info.txt
      echo "  Pull Command: docker pull $GITLAB_REGISTRY_IMAGE:$TAG_CLEANED" >> docker-info.txt
    - |
      curl --request POST --header "PRIVATE-TOKEN: $GITLAB_TOKEN" \
      --data "name=Release $TAG_CLEANED" \
      --data "tag_name=$TAG_CLEANED" \
      --data "description=Automated release for $TAG_CLEANED" \
      --data-urlencode "assets[links][][name]=Docker Info" \
      --data-urlencode "assets[links][][url]=${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/raw/docker-info.txt" \
      --data-urlencode "assets[links][][name]=Changelog" \
      --data-urlencode "assets[links][][url]=${CI_PROJECT_URL}/-/blob/main/CHANGELOG" \
      "https://gitlab.com/api/v4/projects/$CI_PROJECT_ID/releases"
