variables: 
  AWS_REGISTRY: $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/globaleaks
  AWS_REGISTRY_TAG: $AWS_REGISTRY:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHA
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHA
  IMAGE_TAG_LATEST: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHA

default:
  image: registry.gitlab.com/gitlab-org/cloud-deploy/aws-base:latest
  services:
    - registry.gitlab.com/gitlab-org/cloud-deploy/aws-base:latest
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - echo $AWS_REGISTRY
    - echo $AWS_REGISTRY_TAG
    - echo $AWS_DEFAULT_REGION
    - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_REGISTRY

stages:
  - build
  - push

build:
  stage: build
  services:
    - registry.gitlab.com/gitlab-org/cloud-deploy/aws-base:latest
  script:
    - docker build -t $IMAGE_TAG_LATEST -t $CI_REGISTRY_IMAGE:latest -t $AWS_REGISTRY_TAG -t $AWS_REGISTRY:latest . -f docker/Dockerfile.deploy

push-dev:
  stage: push
  only: 
    - develop
  script:
    - docker push $IMAGE_TAG
    - docker push $CI_REGISTRY_IMAGE:latest
    
push-main:
  stage: push
  only:
    - main
  script:
    - docker push $IMAGE_TAG
    - docker push $CI_REGISTRY_IMAGE:latest
    - docker push $AWS_REGISTRY
    - docker push $AWS_REGISTRY:latest
