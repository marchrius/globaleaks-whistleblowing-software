variables:
  TAG: $CI_COMMIT_REF_SLUG-$CI_COMMIT_SHA
  AWS_REGISTRY: $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
  AWS_REGISTRY_IMAGE: $AWS_REGISTRY/globaleaks
  GITLAB_REGISTRY_IMAGE: $CI_REGISTRY_IMAGE

default:
  image: bentolor/docker-dind-awscli
  services:
    - docker:dind
  before_script:
    - printf "%s" "${CI_REGISTRY_PASSWORD}" | docker login --username ${CI_REGISTRY_USER} --password-stdin $CI_REGISTRY
    - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_REGISTRY

stages:
  - build
  - prepare
  - release

build-main:
  variables:
    TAG: $CI_COMMIT_TAG
  stage: build
  only:
    - tags
  script:
    - |
      if [ -z "$TAG" ]; then echo "❌ ERROR: TAG is not set!"; exit 1; fi
      TAG_CLEANED=$(echo "$TAG" | sed 's/-luna$//')
      docker build -t $GITLAB_REGISTRY_IMAGE:$TAG_CLEANED -t $GITLAB_REGISTRY_IMAGE:latest -t $AWS_REGISTRY_IMAGE:$TAG_CLEANED -t $AWS_REGISTRY_IMAGE:latest . -f docker/Dockerfile.deploy
      docker push $GITLAB_REGISTRY_IMAGE:$TAG_CLEANED
      docker push $GITLAB_REGISTRY_IMAGE:latest
      docker push $AWS_REGISTRY_IMAGE:$TAG_CLEANED
      docker push $AWS_REGISTRY_IMAGE:latest

build-develop:
  variables:
    TAG: $CI_COMMIT_REF_SLUG-$CI_COMMIT_SHA
  stage: build
  only:
    - develop
  script:
    - |
      if [ -z "$TAG" ]; then echo "❌ ERROR: TAG is not set!"; exit 1; fi
      docker build -t $GITLAB_REGISTRY_IMAGE:$TAG -t $GITLAB_REGISTRY_IMAGE:latest . -f docker/Dockerfile.deploy
      docker push $GITLAB_REGISTRY_IMAGE:$TAG
      docker push $GITLAB_REGISTRY_IMAGE:latest

prepare:
  stage: prepare
  variables:
    TAG: $CI_COMMIT_TAG
  needs:
    - build-main
  rules:
    - if: $CI_COMMIT_TAG != null
      when: always
    - if: $CI_COMMIT_TAG == null
      when: never
  before_script: []
  script:
    - |
      TAG_CLEANED=$(echo "$TAG" | sed 's/-luna$//')
      echo "TAG_CLEANED=${TAG_CLEANED}" >> variables.env
      echo "Preparing GitLab Release for tag: $TAG_CLEANED"
      VERSION="${TAG_CLEANED#v}"
      awk -v version="Changes in version $VERSION" '
          $0 ~ version {flag=1; print; next}
          flag && /^[[:space:]]*$/ {exit}
          flag {print}
      ' CHANGELOG > RELEASE_DESCRIPTION.txt
      echo ""
      echo ""
      echo "Docker Image AWS" >> RELEASE_DESCRIPTION.txt
      echo "  Registry: $AWS_REGISTRY_IMAGE:$TAG_CLEANED" >> RELEASE_DESCRIPTION.txt
      echo "  Pull Command: docker pull $AWS_REGISTRY_IMAGE:$TAG_CLEANED" >> RELEASE_DESCRIPTION.txt
      echo "" >> RELEASE_DESCRIPTION.txt
      echo "Docker Image GitLab" >> RELEASE_DESCRIPTION.txt
      echo "  Registry: $GITLAB_REGISTRY_IMAGE:$TAG_CLEANED" >> RELEASE_DESCRIPTION.txt
      echo "  Pull Command: docker pull $GITLAB_REGISTRY_IMAGE:$TAG_CLEANED" >> RELEASE_DESCRIPTION.txt
      RELEASE_DESCRIPTION="$(cat RELEASE_DESCRIPTION.txt)"
      echo "RELEASE_DESCRIPTION=${RELEASE_DESCRIPTION}" >> variables.env
  artifacts:
    reports:
      dotenv: variables.env

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  variables:
    TAG: $CI_COMMIT_TAG
  services: []
  before_script: []
  rules:
    - if: $CI_COMMIT_TAG != null
      when: always
    - if: $CI_COMMIT_TAG == null
      when: never
  needs:
    - prepare
  script:
    - echo "Running release-job for $TAG"
  release:
    name: 'Release $TAG_CLEANED'
    description: '$RELEASE_CHANGELOG'
    tag_name: '$TAG_CLEANED'
    ref: '$TAG'
