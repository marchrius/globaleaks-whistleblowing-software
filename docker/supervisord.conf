[supervisord]
nodaemon=true
redirect_stderr=true
user=root

[program:tor]
command=/usr/bin/tor
priority=1
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
user=root

[program:globaleaks]
command=python bin/globaleaks -n -w /var/globaleaks
priority=2
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
user=root
